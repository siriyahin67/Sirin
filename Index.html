<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-4">ตั้งค่าระบบจัดการเกรด (API Version)</h2>

    <div class="card p-4">
      <h4>1. จัดการกลุ่ม (เช่น ชั้นปี)</h4>
      <div class="input-group mb-3">
        <input type="text" id="groupName" class="form-control" placeholder="ระบุชื่อกลุ่มใหม่">
        <button onclick="saveGroup()" class="btn btn-primary" id="btnGroup">บันทึกกลุ่ม</button>
      </div>
    </div>

    <div class="card p-4">
      <h4>2. เพิ่มรายวิชา</h4>
      <div class="mb-3">
        <label class="form-label">เลือกกลุ่ม:</label>
        <select id="groupSelect" class="form-select">
          <option value="">-- กำลังโหลดกลุ่ม... --</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">ชื่อรายวิชา:</label>
        <input type="text" id="subjectName" class="form-control" placeholder="เช่น อายุรศาสตร์ 1">
      </div>
      <button onclick="saveSubject()" class="btn btn-success" id="btnSubject">บันทึกรายวิชา</button>
    </div>
  </div>

  <script>
    // ==========================================
    // นำ URL ของ Web App มาวางที่ตัวแปรนี้
    // ==========================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwH6kT_7xgH0YGytHLENKBmNY5yD34syaMwzFu_nlhbbBlxjZuic-KgOB4S37JSepE7/exec";

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = loadGroups;

    // ฟังก์ชันดึงข้อมูลกลุ่มด้วย GET
    async function loadGroups() {
      try {
        const response = await fetch(WEB_APP_URL + "?action=getGroups");
        const groups = await response.json();
        
        const select = document.getElementById('groupSelect');
        select.innerHTML = '<option value="">-- เลือกกลุ่ม --</option>';
        
        if (groups.length === 0) {
           select.innerHTML = '<option value="">ยังไม่มีข้อมูลกลุ่ม</option>';
           return;
        }
        
        groups.forEach(group => {
          select.innerHTML += `<option value="${group.id}">${group.name}</option>`;
        });
      } catch (error) {
        console.error("โหลดข้อมูลไม่สำเร็จ:", error);
      }
    }

    // ฟังก์ชันบันทึกกลุ่มด้วย POST
    async function saveGroup() {
      const name = document.getElementById('groupName').value;
      if(!name) return alert('กรุณากรอกชื่อกลุ่ม');
      
      document.getElementById('btnGroup').innerText = "กำลังบันทึก...";

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          // ต้องใช้ text/plain เพื่อป้องกันปัญหา CORS Preflight
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "addGroup", groupName: name })
        });
        
        const result = await response.json();
        if(result.status === 'success') {
          alert('บันทึกกลุ่มสำเร็จ!');
          document.getElementById('groupName').value = '';
          loadGroups(); // รีโหลดตัวเลือกกลุ่มใหม่
        }
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการบันทึก");
        console.error(error);
      }
      
      document.getElementById('btnGroup').innerText = "บันทึกกลุ่ม";
    }

    // ฟังก์ชันบันทึกวิชาด้วย POST
    async function saveSubject() {
      const name = document.getElementById('subjectName').value;
      const groupId = document.getElementById('groupSelect').value;
      
      if(!name || !groupId) return alert('กรุณากรอกข้อมูลให้ครบทั้งกลุ่มและชื่อรายวิชา');

      document.getElementById('btnSubject').innerText = "กำลังบันทึก...";

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "addSubject", subjectName: name, groupId: groupId })
        });

        const result = await response.json();
        if(result.status === 'success') {
          alert('บันทึกรายวิชาสำเร็จ!');
          document.getElementById('subjectName').value = '';
        }
      } catch (error) {
        alert("เกิดข้อผิดพลาดในการบันทึก");
        console.error(error);
      }

      document.getElementById('btnSubject').innerText = "บันทึกรายวิชา";
    }
  </script>
</body>
</html>
