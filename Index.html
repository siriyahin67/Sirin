<!DOCTYPE html>
<html>
<head>
    <title>ระบบกรอกคะแนน</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container"> <span class="navbar-brand">Admin: ระบบจัดการเกรด</span> </div>
    </nav>

    <div class="container mt-4">
        <div class="list-group">
            <button class="list-group-item" onclick="showPage('subject')">หน้ารายวิชา</button>
            <button class="list-group-item" onclick="showPage('evaluation')">ตั้งค่าหัวข้อการประเมิน (% / MPL)</button>
            <button class="list-group-item" onclick="showPage('grading')">ตั้งค่าอันตรภาคชั้น</button>
        </div>

        <div id="subject-page" class="mt-4" style="display:none;">
            <h3>จัดการรายวิชา</h3>
            <input type="text" id="subjName" placeholder="ชื่อรายวิชา" class="form-control mb-2">
            <button onclick="saveData()" class="btn btn-success">บันทึก</button>
        </div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbwH6kT_7xgH0YGytHLENKBmNY5yD34syaMwzFu_nlhbbBlxjZuic-KgOB4S37JSepE7/exec";

        function saveData() {
            const data = {
                targetSheet: "Subjects",
                rowData: [document.getElementById('subjName').value]
            };
            
            fetch(webAppUrl, {
                method: 'POST',
                body: JSON.stringify(data)
            }).then(res => alert('บันทึกสำเร็จ!'));
        }
        
        function showPage(pageName) {
            // เขียน JS เพื่อสลับการแสดงผลหน้าจอ
        }
    </script>
</body>
</html>
