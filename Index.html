<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* ให้ padding ไม่ล้น */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        button:hover {
            background-color: #2980b9;
        }
        #message {
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginForm">
        <h2>ระบบจัดการเกรด<br>นิสิตแพทย์</h2>
        <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน (Username)">
        <input type="password" id="password" placeholder="รหัสผ่าน (Password)">
        <button onclick="doLogin()" id="loginBtn">เข้าสู่ระบบ</button>
        <div id="message"></div>
    </div>

    <script>
        function doLogin() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            var btn = document.getElementById("loginBtn");
            var msg = document.getElementById("message");

            // ตรวจสอบเบื้องต้นว่ากรอกครบไหม
            if(user === "" || pass === "") {
                msg.innerHTML = "กรุณากรอกข้อมูลให้ครบถ้วน";
                msg.style.color = "red";
                return;
            }

            // เปลี่ยนสถานะปุ่ม
            btn.innerHTML = "กำลังตรวจสอบ...";
            btn.disabled = true;

            // ส่งข้อมูลไปหลังบ้าน (Code.gs)
            google.script.run
                .withSuccessHandler(function(response) {
                    btn.innerHTML = "เข้าสู่ระบบ";
                    btn.disabled = false;

                    if (response.status === "success") {
                        msg.style.color = "green";
                        msg.innerHTML = response.message;
                        
                        // สมมติว่าแยกหน้าตามสิทธิ์
                        if(response.role === "admin") {
                            alert("ยินดีต้อนรับ ผู้ดูแลระบบ (Admin) - โหลดหน้าตั้งค่า...");
                            // โค้ดเปลี่ยนหน้าเว็บ หรือซ่อนหน้า Login โชว์หน้าแอดมินจะใส่ตรงนี้
                        } else if (response.role === "teacher") {
                            alert("ยินดีต้อนรับ อาจารย์ - โหลดหน้าลงคะแนน...");
                            // โค้ดเปลี่ยนหน้าเว็บ หรือซ่อนหน้า Login โชว์หน้าอาจารย์จะใส่ตรงนี้
                        }

                    } else {
                        msg.style.color = "red";
                        msg.innerHTML = response.message;
                    }
                })
                .verifyLogin(user, pass); // เรียกใช้ฟังก์ชันใน Code.gs
        }
    </script>

</body>
</html>
