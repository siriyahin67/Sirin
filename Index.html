<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f0f2f5; font-family: 'Chakra Petch', sans-serif; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .search-box { background: #e9ecef; border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        .badge-grade { width: 40px; display: inline-block; text-align: center; font-size: 1.1rem; }
        .grade-A { color: #28a745; font-weight: bold; }
        .grade-F { color: #dc3545; font-weight: bold; }
        .table thead { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0">🏥 ระบบสรุปผลการเรียนนิสิตแพทย์</h2>
        <span class="badge bg-info text-dark">อัปเดตเรียลไทม์</span>
    </div>

    <div class="search-box">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">🔎 ค้นหาด้วยรหัสนิสิต หรือ ชื่อ</label>
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="ระบุรหัส 8 หลัก หรือชื่อ-นามสกุล..." onkeyup="filterTable()">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">📅 ปีการศึกษา</label>
                <select id="yearFilter" class="form-select form-select-lg" onchange="filterTable()">
                    <option value="">ทั้งหมด</option>
                    <option value="2566">2566</option>
                    <option value="2567">2567</option>
                </select>
            </div>
            <div class="col-md-3 text-end d-flex align-items-end">
                <button onclick="loadData()" class="btn btn-outline-primary btn-lg w-100">🔄 ดึงข้อมูลใหม่</button>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-hover border">
            <thead>
                <tr>
                    <th>รหัสวิชา</th>
                    <th>ชื่อรายวิชา</th>
                    <th>นิสิต</th>
                    <th>ชั้นปี / กลุ่ม</th>
                    <th class="text-center">ผลการเรียน</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="5" class="text-center p-5">กรุณารอสักครู่ กำลังเชื่อมต่อฐานข้อมูลชีต...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let rawData = []; // เก็บข้อมูลต้นฉบับไว้กรอง

    // โหลดข้อมูลเมื่อเปิดหน้าจอ
    window.onload = loadData;

    function loadData() {
        document.getElementById('table-body').innerHTML = '<tr><td colspan="5" class="text-center p-5 text-primary">🔄 กำลังโหลดข้อมูล...</td></tr>';
        google.script.run.withSuccessHandler(data => {
            rawData = data;
            renderTable(data);
        }).getGradesData();
    }

    function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = ''; 

        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-5">ไม่พบข้อมูลผลการเรียน</td></tr>';
            return;
        }

        data.forEach(item => {
            // เลือกสีเกรด (Medical Context: S/U หรือ A-F)
            let gradeClass = item.grade === 'F' || item.grade === 'U' ? 'grade-F' : 'grade-A';
            
            const row = `<tr>
                <td class="fw-bold text-primary">${item.courseCode}</td>
                <td>${item.courseName}</td>
                <td>
                    <div class="fw-bold">${item.name}</div>
                    <small class="text-muted">${item.studentId}</small>
                </td>
                <td>ปี ${item.year} <span class="badge bg-light text-dark border">กลุ่ม ${item.group}</span></td>
                <td class="text-center"><span class="badge-grade ${gradeClass}">${item.grade}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // ฟังก์ชันกรองข้อมูล (ทำให้ดูง่ายและเร็ว)
    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const yearValue = document.getElementById('yearFilter').value;
        
        const filtered = rawData.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchText) || 
                                 item.studentId.toString().includes(searchText) ||
                                 item.courseName.toLowerCase().includes(searchText);
            const matchesYear = yearValue === "" || item.year.toString() === yearValue;
            
            return matchesSearch && matchesYear;
        });
        
        renderTable(filtered);
    }
</script>

</body>
</html>
