<!DOCTYPE html>
<html>
<head>
    <title>ระบบจัดการเกรด</title>
</head>
<body>
    <h1>รายชื่อและคะแนนจาก Google Sheets</h1>
    <div id="display-data">กำลังโหลดข้อมูล...</div>

    <script>
        // เอา URL ที่ได้จากขั้นตอนที่ 1 มาวางตรงนี้
        const url = "https://script.google.com/macros/s/AKfycbwH6kT_7xgH0YGytHLENKBmNY5yD34syaMwzFu_nlhbbBlxjZuic-KgOB4S37JSepE7/exec"; 

        fetch(url)
            .then(response => response.json())
            .then(data => {
                console.log(data); // ดูข้อมูลใน Console
                document.getElementById('display-data').innerText = JSON.stringify(data);
            });
    </script>
</body>
</html>
