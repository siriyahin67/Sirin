<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { padding: 20px; background-color: #f8f9fa; }
      .container { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="mb-4">📊 รายงานผลการเรียน</h2>
      <div class="table-responsive">
        <table class="table table-striped">
          <thead class="table-dark">
            <tr>
              <th>รหัส</th>
              <th>ชื่อ-นามสกุล</th>
              <th>วิชา</th>
              <th>ปีการศึกษา</th>
              <th>กลุ่ม</th>
              <th>เกรด</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="6" class="text-center">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      // เมื่อหน้าเว็บโหลด ให้ไปเรียกข้อมูลจากฝั่ง Server (Code.gs)
      window.onload = () => {
        google.script.run.withSuccessHandler(renderTable).getGradesData();
      };

      function renderTable(data) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = ''; // ล้างข้อความ Loading

        data.forEach(item => {
          const row = `<tr>
            <td>${item.studentId}</td>
            <td>${item.name}</td>
            <td>${item.courseCode} - ${item.courseName}</td>
            <td>${item.year}</td>
            <td>${item.group}</td>
            <td><strong>${item.grade}</strong></td>
          </tr>`;
          tbody.innerHTML += row;
        });
      }
    </script>
  </body>
</html>
