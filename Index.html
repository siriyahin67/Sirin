<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-4">ตั้งค่าระบบจัดการเกรด</h2>

    <div class="card p-4">
      <h4>1. จัดการกลุ่ม (เช่น ชั้นปี)</h4>
      <div class="input-group mb-3">
        <input type="text" id="groupName" class="form-control" placeholder="ระบุชื่อกลุ่มใหม่">
        <button onclick="saveGroup()" class="btn btn-primary">บันทึกกลุ่ม</button>
      </div>
    </div>

    <div class="card p-4">
      <h4>2. เพิ่มรายวิชา</h4>
      <div class="mb-3">
        <label class="form-label">เลือกกลุ่ม:</label>
        <select id="groupSelect" class="form-select">
          <option value="">-- กำลังโหลดกลุ่ม... --</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">ชื่อรายวิชา:</label>
        <input type="text" id="subjectName" class="form-control" placeholder="เช่น อายุรศาสตร์ 1">
      </div>
      <button onclick="saveSubject()" class="btn btn-success">บันทึกรายวิชา</button>
    </div>
  </div>

  <script>
    // เมื่อเปิดหน้าเว็บ ให้โหลดกลุ่มมาใส่ใน Dropdown ทันที
    window.onload = loadGroups;

    function loadGroups() {
      google.script.run.withSuccessHandler(function(groups) {
        const select = document.getElementById('groupSelect');
        select.innerHTML = '<option value="">-- เลือกกลุ่ม --</option>';
        if (groups.length === 0) {
           select.innerHTML = '<option value="">ยังไม่มีข้อมูลกลุ่ม</option>';
           return;
        }
        groups.forEach(group => {
          select.innerHTML += `<option value="${group.id}">${group.name}</option>`;
        });
      }).getAllGroups();
    }

    function saveGroup() {
      const name = document.getElementById('groupName').value;
      if(!name) return alert('กรุณากรอกชื่อกลุ่ม');
      
      google.script.run.withSuccessHandler(() => {
        alert('บันทึกกลุ่มสำเร็จ!');
        document.getElementById('groupName').value = '';
        loadGroups(); // รีโหลด Dropdown ใหม่อัตโนมัติ เพื่อให้กลุ่มใหม่แสดงทันที
      }).addGroup(name);
    }

    function saveSubject() {
      const name = document.getElementById('subjectName').value;
      const groupId = document.getElementById('groupSelect').value;
      
      if(!name || !groupId) return alert('กรุณากรอกข้อมูลให้ครบทั้งกลุ่มและชื่อรายวิชา');

      google.script.run.withSuccessHandler(() => {
        alert('บันทึกรายวิชาสำเร็จ!');
        document.getElementById('subjectName').value = '';
      }).addSubject(name, groupId);
    }
  </script>
</body>
</html>
